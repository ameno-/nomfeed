<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=320">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 340px;
      min-height: 280px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .header img {
      width: 20px;
      height: 20px;
      border-radius: 4px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .url-display {
      font-size: 12px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 12px;
      padding: 4px 0;
    }

    .field { margin-bottom: 10px; }

    label {
      display: block;
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e5e5e5;
      font-size: 13px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: #f97316; }

    /* Extraction toggle */
    .extract-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .extract-toggle input[type="checkbox"] {
      accent-color: #f97316;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .extract-toggle label {
      font-size: 13px;
      color: #ccc;
      text-transform: none;
      letter-spacing: 0;
      margin: 0;
      cursor: pointer;
    }

    /* Pattern chips */
    .patterns {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
      padding: 8px;
      background: #1a1a1a;
      border-radius: 6px;
      border: 1px solid #222;
    }

    .patterns.visible { display: flex; }

    .patterns .no-llm {
      font-size: 11px;
      color: #888;
      padding: 4px 0;
    }

    .chip {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #0f0f0f;
      color: #999;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .chip:hover { border-color: #555; color: #ccc; }

    .chip.selected {
      border-color: #f97316;
      background: rgba(249, 115, 22, 0.12);
      color: #f97316;
    }

    /* Buttons */
    button#save {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #f97316;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }

    button#save:hover { background: #ea580c; }
    button#save:active { background: #c2410c; }
    button#save:disabled { background: #333; color: #666; cursor: not-allowed; }

    /* Status + CLI output */
    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }

    .status.success { color: #22c55e; }
    .status.error { color: #ef4444; }

    .cli-output {
      display: none;
      margin-top: 8px;
      padding: 8px 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 12px;
      color: #f97316;
      cursor: pointer;
      position: relative;
      word-break: break-all;
    }

    .cli-output.visible { display: block; }

    .cli-output:hover { border-color: #f97316; }

    .cli-output .copy-hint {
      position: absolute;
      top: -8px;
      right: 8px;
      font-size: 9px;
      color: #555;
      background: #0f0f0f;
      padding: 0 4px;
      font-family: -apple-system, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .cli-output.copied { border-color: #22c55e; color: #22c55e; }

    .cli-output .cli-line {
      display: block;
      padding: 1px 0;
    }

    .cli-output .cli-line + .cli-line {
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1px solid #222;
      color: #888;
      font-size: 11px;
    }

    /* Footer */
    .footer {
      margin-top: 12px;
      text-align: center;
    }

    .footer a {
      font-size: 11px;
      color: #555;
      text-decoration: none;
      cursor: pointer;
    }

    .footer a:hover { color: #f97316; }

    .settings {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #222;
    }

    .settings.visible { display: block; }

    button.btn-sm {
      width: 100%;
      padding: 6px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      margin-top: 6px;
    }

    button.btn-sm:hover { background: #444; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="NomFeed">
    <h1>NomFeed</h1>
  </div>

  <div class="url-display" id="url">Loading...</div>

  <div class="field">
    <label>Title</label>
    <input type="text" id="title" placeholder="Auto-detected from page">
  </div>

  <div class="field">
    <label>Tags</label>
    <input type="text" id="tags" placeholder="comma, separated, tags">
  </div>

  <div class="extract-toggle">
    <input type="checkbox" id="extract">
    <label for="extract">Extract with LLM</label>
  </div>

  <div class="patterns" id="patterns">
    <span class="no-llm" id="no-llm" style="display:none">Set OPENROUTER_API_KEY to enable extraction</span>
  </div>

  <button id="save">&#x1F374; Nom this page</button>

  <div class="status" id="status"></div>

  <div class="cli-output" id="cli-output">
    <span class="copy-hint">click to copy</span>
    <span id="cli-cmd"></span>
  </div>

  <div class="footer">
    <a id="settings-toggle">&#x2699; Settings</a>
  </div>

  <div class="settings" id="settings">
    <div class="field">
      <label>Server URL</label>
      <input type="text" id="serverUrl" value="http://localhost:24242">
    </div>
    <button class="btn-sm" id="save-settings">Save Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
