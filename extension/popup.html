<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=340">
  <style>
    :root {
      --paper: hsl(44 34% 97%);
      --paper-deep: hsl(40 22% 92%);
      --ink: hsl(40 6% 16%);
      --muted: hsl(40 8% 45%);
      --line: hsl(35 16% 84%);
      --save: hsl(100 12% 63%);
      --extract-a: hsl(36 78% 73%);
      --extract-b: hsl(24 74% 67%);
      --annotate-a: hsl(24 78% 47%);
      --annotate-b: hsl(18 74% 41%);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 340px;
      min-height: 360px;
    }

    body {
      font-family: "Avenir Next", "SF Pro Rounded", "Segoe UI", sans-serif;
      background: linear-gradient(160deg, var(--paper) 0%, var(--paper-deep) 100%);
      color: var(--ink);
      padding: 16px;
    }

    .shell {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .mark {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: var(--save);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 1px 0 hsl(0 0% 100% / 0.4);
      font-size: 15px;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .subtitle {
      margin-top: 1px;
      color: var(--muted);
      font-size: 11px;
    }

    .page-card,
    .panel {
      padding: 12px;
      border-radius: 14px;
      background: hsl(40 20% 95% / 0.9);
      border: 1px solid var(--line);
    }

    .label {
      margin-bottom: 6px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .page-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.35;
    }

    .page-url {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.45;
      word-break: break-word;
    }

    .actions {
      display: grid;
      gap: 8px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 11px 12px;
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px hsl(40 6% 16% / 0.08);
    }

    button:disabled {
      opacity: 0.58;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .page-tools { background: hsl(40 22% 94%); border: 1px solid var(--line); }
    .save { background: var(--save); }
    .extract { background: linear-gradient(135deg, var(--extract-a), var(--extract-b)); }
    .annotate { background: linear-gradient(135deg, var(--annotate-a), var(--annotate-b)); color: white; }

    .meta {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.45;
    }

    .patterns {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .twitter-panel {
      border: 1px solid hsl(204 55% 82%);
      background: linear-gradient(160deg, hsl(205 100% 97%) 0%, hsl(205 86% 93%) 100%);
    }

    .twitter-save {
      background: linear-gradient(135deg, hsl(204 94% 64%), hsl(212 88% 58%));
      color: white;
    }

    .chip {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: hsl(40 20% 96%);
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .chip.selected {
      border-color: hsl(100 12% 55%);
      background: hsl(100 12% 63% / 0.16);
      color: hsl(100 18% 33%);
    }

    .status {
      min-height: 18px;
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }

    .status.success { color: hsl(100 20% 35%); }
    .status.error { color: hsl(0 48% 45%); }

    .cli-output {
      display: none;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: hsl(40 18% 93%);
      color: hsl(100 14% 34%);
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      cursor: pointer;
    }

    .cli-output.visible { display: block; }

    .settings {
      display: none;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .settings.visible { display: block; }

    input[type="text"] {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: hsl(0 0% 100% / 0.78);
      padding: 8px 10px;
      font: inherit;
      color: var(--ink);
      outline: none;
    }

    .footer {
      text-align: center;
    }

    .footer a {
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <span class="mark">🍴</span>
      <div>
        <div class="title">NomFeed</div>
        <div class="subtitle">page-centric capture tools</div>
      </div>
    </div>

    <div class="page-card">
      <div class="label">Current Page</div>
      <div class="page-title" id="pageTitle">Loading…</div>
      <div class="page-url" id="pageUrl"></div>
    </div>

    <div class="actions">
      <button class="page-tools" id="openDeck">Open page tools</button>
      <button class="save" id="savePage">Save Page</button>
      <button class="extract" id="saveExtract">Save + Extract</button>
      <button class="annotate" id="annotatePage">Annotate Page</button>
    </div>

    <div class="panel twitter-panel" id="twitterPanel" hidden>
      <div class="label">Twitter/X Enhancement</div>
      <div class="meta" id="twitterMeta">Twitter artifact capture is available on this page.</div>
      <div style="margin-top:8px">
        <button class="twitter-save" id="saveTweet">Save Tweet Artifact</button>
      </div>
    </div>

    <div class="panel">
      <div class="label">Extraction Defaults</div>
      <div class="meta" id="extractMeta">Loading server state…</div>
      <div class="patterns" id="patterns"></div>
    </div>

    <div class="status" id="status"></div>

    <div class="cli-output" id="cliOutput"></div>

    <div class="footer">
      <a id="settingsToggle">⚙ Settings</a>
    </div>

    <div class="settings" id="settings">
      <div class="panel">
        <div class="label">Server URL</div>
        <input type="text" id="serverUrl" value="http://localhost:24242">
        <div style="margin-top:8px">
          <button class="page-tools" id="saveSettings">Save Settings</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
