<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=340">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 340px;
      min-height: 280px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: hsl(40 20% 96%);
      color: hsl(40 6% 16%);
      padding: 16px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .header .logo-icon {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      background: hsl(100 12% 63%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      line-height: 1;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 500;
      color: hsl(40 6% 16%);
      letter-spacing: -0.01em;
    }

    /* URL display */
    .url-display {
      font-size: 12px;
      color: hsl(40 8% 50%);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 12px;
      padding: 4px 0;
    }

    /* Fields */
    .field { margin-bottom: 10px; }

    label {
      display: block;
      font-size: 11px;
      color: hsl(40 8% 50%);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid hsl(35 15% 85%);
      border-radius: 8px;
      background: hsl(40 15% 94%);
      color: hsl(40 6% 16%);
      font-size: 13px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: hsl(100 12% 63%);
      background: white;
    }

    /* Extract toggle */
    .extract-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .extract-toggle input[type="checkbox"] {
      accent-color: hsl(100 12% 50%);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .extract-toggle label {
      font-size: 13px;
      color: hsl(40 6% 25%);
      text-transform: none;
      letter-spacing: 0;
      margin: 0;
      cursor: pointer;
    }

    /* Pattern chips */
    .patterns {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
      padding: 8px;
      background: hsl(40 15% 94%);
      border-radius: 8px;
      border: 1px solid hsl(35 15% 88%);
    }

    .patterns.visible { display: flex; }

    .patterns .no-llm {
      font-size: 11px;
      color: hsl(40 8% 50%);
      padding: 4px 0;
    }

    .chip {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid hsl(35 15% 85%);
      background: hsl(40 20% 96%);
      color: hsl(40 8% 50%);
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .chip:hover {
      border-color: hsl(35 15% 78%);
      color: hsl(40 6% 25%);
    }

    .chip.selected {
      border-color: hsl(100 12% 63%);
      background: hsl(100 12% 63% / 0.15);
      color: hsl(100 12% 40%);
    }

    /* Save button */
    button#save {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: hsl(100 12% 63%);
      color: hsl(40 6% 16%);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
      transition: all 0.2s;
      box-shadow: 0 1px 2px hsl(40 6% 16% / 0.08);
    }

    button#save:hover {
      background: hsl(100 12% 55%);
      box-shadow: 0 2px 8px hsl(100 12% 63% / 0.25);
    }

    button#save:active { background: hsl(100 12% 48%); }

    button#save:disabled {
      background: hsl(35 15% 85%);
      color: hsl(40 8% 60%);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Status */
    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }

    .status.success { color: hsl(100 20% 40%); }
    .status.error { color: hsl(0 40% 50%); }

    /* CLI output */
    .cli-output {
      display: none;
      margin-top: 8px;
      padding: 8px 10px;
      background: hsl(40 12% 92%);
      border: 1px solid hsl(35 15% 85%);
      border-radius: 8px;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 12px;
      color: hsl(100 12% 45%);
      cursor: pointer;
      position: relative;
      word-break: break-all;
      transition: border-color 0.2s;
    }

    .cli-output.visible { display: block; }
    .cli-output:hover { border-color: hsl(100 12% 63%); }

    .cli-output .copy-hint {
      position: absolute;
      top: -8px;
      right: 8px;
      font-size: 9px;
      color: hsl(40 8% 55%);
      background: hsl(40 20% 96%);
      padding: 0 4px;
      font-family: -apple-system, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .cli-output.copied {
      border-color: hsl(100 20% 45%);
      color: hsl(100 20% 40%);
    }

    .cli-output .cli-line {
      display: block;
      padding: 1px 0;
    }

    .cli-output .cli-line + .cli-line {
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1px solid hsl(35 15% 88%);
      color: hsl(40 8% 55%);
      font-size: 11px;
    }

    /* Footer */
    .footer {
      margin-top: 12px;
      text-align: center;
    }

    .footer a {
      font-size: 11px;
      color: hsl(40 8% 55%);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }

    .footer a:hover { color: hsl(100 12% 45%); }

    /* Settings */
    .settings {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid hsl(35 15% 88%);
    }

    .settings.visible { display: block; }

    button.btn-sm {
      width: 100%;
      padding: 6px;
      border: none;
      border-radius: 6px;
      background: hsl(40 15% 94%);
      border: 1px solid hsl(35 15% 85%);
      color: hsl(40 8% 45%);
      font-size: 12px;
      cursor: pointer;
      margin-top: 6px;
      transition: all 0.2s;
    }

    button.btn-sm:hover {
      background: hsl(35 20% 90%);
      border-color: hsl(35 15% 78%);
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo-icon">🍴</span>
    <h1>NomFeed</h1>
  </div>

  <div class="url-display" id="url">Loading...</div>

  <div class="field">
    <label>Title</label>
    <input type="text" id="title" placeholder="Auto-detected from page">
  </div>

  <div class="field">
    <label>Tags</label>
    <input type="text" id="tags" placeholder="comma, separated, tags">
  </div>

  <div class="extract-toggle">
    <input type="checkbox" id="extract">
    <label for="extract">Extract with LLM</label>
  </div>

  <div class="patterns" id="patterns">
    <span class="no-llm" id="no-llm" style="display:none">Set OPENROUTER_API_KEY to enable extraction</span>
  </div>

  <button id="save">🍴 Nom this page</button>

  <div class="status" id="status"></div>

  <div class="cli-output" id="cli-output">
    <span class="copy-hint">click to copy</span>
    <span id="cli-cmd"></span>
  </div>

  <div class="footer">
    <a id="settings-toggle">⚙ Settings</a>
  </div>

  <div class="settings" id="settings">
    <div class="field">
      <label>Server URL</label>
      <input type="text" id="serverUrl" value="http://localhost:24242">
    </div>
    <button class="btn-sm" id="save-settings">Save Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
