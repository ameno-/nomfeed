<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=320">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 320px;
      min-height: 280px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .header img {
      width: 20px;
      height: 20px;
      border-radius: 4px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .url-display {
      font-size: 12px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 12px;
      padding: 4px 0;
    }

    .field { margin-bottom: 10px; }

    label {
      display: block;
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e5e5e5;
      font-size: 13px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #f97316; }

    button#save {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #f97316;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }

    button#save:hover { background: #ea580c; }
    button#save:active { background: #c2410c; }
    button#save:disabled { background: #333; color: #666; cursor: not-allowed; }

    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }

    .status.success { color: #22c55e; }
    .status.error { color: #ef4444; }

    .footer {
      margin-top: 12px;
      text-align: center;
    }

    .footer a {
      font-size: 11px;
      color: #555;
      text-decoration: none;
      cursor: pointer;
    }

    .footer a:hover { color: #f97316; }

    .settings {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #222;
    }

    .settings.visible { display: block; }

    button.btn-sm {
      width: 100%;
      padding: 6px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      margin-top: 6px;
    }

    button.btn-sm:hover { background: #444; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="NomFeed">
    <h1>NomFeed</h1>
  </div>

  <div class="url-display" id="url">Loading...</div>

  <div class="field">
    <label>Title</label>
    <input type="text" id="title" placeholder="Auto-detected from page">
  </div>

  <div class="field">
    <label>Tags</label>
    <input type="text" id="tags" placeholder="comma, separated, tags">
  </div>

  <button id="save">&#x1F374; Nom this page</button>

  <div class="status" id="status"></div>

  <div class="footer">
    <a id="settings-toggle">&#x2699; Settings</a>
  </div>

  <div class="settings" id="settings">
    <div class="field">
      <label>Server URL</label>
      <input type="text" id="serverUrl" value="http://localhost:24242">
    </div>
    <button class="btn-sm" id="save-settings">Save Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
