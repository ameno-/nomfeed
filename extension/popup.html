<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      padding: 16px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h1 span { font-size: 20px; }

    .field {
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    input, textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e5e5e5;
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }

    input:focus, textarea:focus {
      border-color: #555;
    }

    textarea {
      height: 40px;
      resize: vertical;
    }

    .url-display {
      font-size: 12px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 6px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
    }

    button:hover { background: #1d4ed8; }
    button:active { background: #1e40af; }
    button:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }

    .status.success { color: #22c55e; }
    .status.error { color: #ef4444; }

    .settings-link {
      display: block;
      text-align: center;
      margin-top: 10px;
      font-size: 11px;
      color: #555;
      text-decoration: none;
      cursor: pointer;
    }

    .settings-link:hover { color: #888; }

    .settings {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #222;
    }

    .settings.visible { display: block; }
  </style>
</head>
<body>
  <h1><span>📑</span> MarkStash</h1>

  <div class="url-display" id="url"></div>

  <div class="field">
    <label>Title</label>
    <input type="text" id="title" placeholder="Auto-detected from page">
  </div>

  <div class="field">
    <label>Tags</label>
    <input type="text" id="tags" placeholder="comma, separated, tags">
  </div>

  <button id="save">Save to MarkStash</button>

  <div class="status" id="status"></div>

  <a class="settings-link" id="settings-toggle">⚙ Settings</a>

  <div class="settings" id="settings">
    <div class="field">
      <label>Server URL</label>
      <input type="text" id="serverUrl" placeholder="http://localhost:24242">
    </div>
    <button id="save-settings" style="background: #333; font-size: 12px; padding: 6px;">Save Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
