<!-- Open this in a browser to generate icon PNGs, then right-click save -->
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function draw(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  
  // Background
  ctx.fillStyle = '#2563eb';
  const r = size * 0.15;
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();
  
  // "M" letter
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${size * 0.6}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('M', size/2, size/2 + size*0.03);
  
  // Small down arrow (save indicator)
  const ax = size * 0.75;
  const ay = size * 0.72;
  const as = size * 0.12;
  ctx.fillStyle = '#93c5fd';
  ctx.beginPath();
  ctx.moveTo(ax - as, ay - as/2);
  ctx.lineTo(ax + as, ay - as/2);
  ctx.lineTo(ax, ay + as/2);
  ctx.fill();
}

draw('c16', 16);
draw('c48', 48);
draw('c128', 128);

// Auto-download
['c16','c48','c128'].forEach(id => {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.download = `icon${c.width}.png`;
  a.href = c.toDataURL();
  document.body.appendChild(a);
  a.textContent = ` Download ${c.width}px `;
});
</script>
